<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>별빛사주 관리자</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section id="loginPanel" class="panel admin-panel">
        <p class="section-heading__kicker">Admin</p>
        <h1>관리자 로그인</h1>
        <p class="admin-copy">
          정적 사이트용 간단 보호 화면입니다. 실제 회원/운영자 인증은 서버 기능을 붙일 때 강화하세요.
        </p>
        <form id="loginForm">
          <label class="field">
            <span>비밀번호</span>
            <input id="adminPassword" type="password" autocomplete="current-password" placeholder="초기 비밀번호 admin1234" />
          </label>
          <button class="primary-button" type="submit">들어가기</button>
          <p id="loginError" class="form-error"></p>
        </form>
      </section>

      <section id="settingsPanel" class="panel admin-panel hidden">
        <div class="section-heading">
          <span class="section-heading__mark"></span>
          <div>
            <p class="section-heading__kicker">Settings</p>
            <h1>플랫폼 설정</h1>
          </div>
        </div>

        <form id="settingsForm">
          <label class="field">
            <span>Google Apps Script URL</span>
            <input id="appsScriptUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec" />
          </label>

          <label class="field">
            <span>Gemini 모델</span>
            <select id="geminiModel">
              <option value="gemini-1.5-flash">gemini-1.5-flash</option>
              <option value="gemini-1.5-pro">gemini-1.5-pro</option>
              <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            </select>
          </label>

          <label class="field">
            <span>공지</span>
            <input id="notice" type="text" maxlength="120" placeholder="예: 상담 결과는 참고용으로 활용해 주세요." />
          </label>

          <label class="field">
            <span>Prompt 운영 메모</span>
            <textarea id="promptMemo" rows="6" placeholder="Gemini 프롬프트에 추가로 전달할 운영 메모를 적습니다."></textarea>
          </label>

          <label class="field">
            <span>추천 버튼 문구</span>
            <input id="recommendationButtonText" type="text" placeholder="행운 아이템 보기" />
          </label>

          <label class="field">
            <span>추천 기본 URL</span>
            <input id="recommendationBaseUrl" type="url" placeholder="https://..." />
          </label>

          <button class="primary-button" type="submit">설정 저장</button>
          <a class="secondary-link" href="../index.html">사이트로 돌아가기</a>
          <p id="saveMessage" class="admin-message"></p>
        </form>
      </section>
    </main>

    <script src="../src/services/config.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
